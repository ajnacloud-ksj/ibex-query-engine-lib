name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests with Docker'
        required: false
        default: false
        type: boolean

jobs:
  test:
    name: Test Python 3.12 on Ubuntu
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: false
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"
    
    - name: Run unit tests
      run: |
        uv run pytest tests/ -v --cov=src/ibexdb --cov-report=xml --cov-report=term --cov-report=html
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-ubuntu-py3.12
      continue-on-error: true

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: false
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install linting tools
      run: |
        uv pip install --system ruff black mypy
    
    - name: Run ruff
      run: ruff check src/
    
    - name: Check formatting with black
      run: black --check src/
    
    - name: Type check with mypy
      run: mypy src/ibexdb --ignore-missing-imports
      continue-on-error: true

  integration:
    name: Integration Tests with Docker (Optional)
    runs-on: ubuntu-latest
    if: github.event.inputs.run_integration == 'true'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: false
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install package
      run: |
        uv pip install --system -e .
    
    - name: Start Docker services
      run: |
        docker-compose -f docker-compose.test.yml up -d
        sleep 30  # Wait for services to be ready
    
    - name: Run integration tests
      run: |
        uv run python test_with_docker.py
    
    - name: Stop Docker services
      if: always()
      run: |
        docker-compose -f docker-compose.test.yml down -v

