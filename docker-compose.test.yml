# Minimal Docker Compose for Testing IbexDB Library
# Only includes essential services needed for testing federated queries

services:
  #═════════════════════════════════════════════════════════════════════════
  # PostgreSQL - Test Database
  #═════════════════════════════════════════════════════════════════════════
  postgres-test:
    image: postgres:15-alpine
    container_name: ibexdb-postgres-test
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5434:5432"
    volumes:
      - ./test-data/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 3s
      timeout: 2s
      retries: 5
    networks:
      - ibexdb-test

  #═════════════════════════════════════════════════════════════════════════
  # MySQL - Test Database
  #═════════════════════════════════════════════════════════════════════════
  mysql-test:
    image: mysql:8.0
    container_name: ibexdb-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3308:3306"
    volumes:
      - ./test-data/init-mysql.sql:/docker-entrypoint-initdb.d/01-init.sql
      - mysql_test_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 3s
      timeout: 2s
      retries: 5
    networks:
      - ibexdb-test

  #═════════════════════════════════════════════════════════════════════════
  # MinIO - S3-compatible Storage
  #═════════════════════════════════════════════════════════════════════════
  minio-test:
    image: minio/minio:latest
    container_name: ibexdb-minio-test
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_test_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 2s
      retries: 5
    networks:
      - ibexdb-test

  # MinIO Setup - Create test bucket
  minio-setup:
    image: minio/mc:latest
    container_name: ibexdb-minio-setup
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio-test:9000 minioadmin minioadmin;
      mc mb minio/test-bucket --ignore-existing;
      mc anonymous set download minio/test-bucket;
      echo '✅ MinIO test bucket created';
      "
    networks:
      - ibexdb-test
    restart: "no"

  #═════════════════════════════════════════════════════════════════════════
  # Iceberg REST Catalog
  #═════════════════════════════════════════════════════════════════════════
  iceberg-rest:
    image: tabulario/iceberg-rest:0.9.0
    container_name: ibexdb-iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - CATALOG_WAREHOUSE=s3://test-bucket/iceberg-warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio-test:9000
      - CATALOG_S3_ACCESS__KEY__ID=minioadmin
      - CATALOG_S3_SECRET__ACCESS__KEY=minioadmin
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    networks:
      - ibexdb-test

networks:
  ibexdb-test:
    name: ibexdb-test
    driver: bridge

volumes:
  postgres_test_data:
    name: ibexdb_postgres_test
  mysql_test_data:
    name: ibexdb_mysql_test
  minio_test_data:
    name: ibexdb_minio_test

